# PostgreSQL Production configuration
spring:
  thymeleaf.cache: true
  main.banner-mode: off
  
  # PostgreSQL Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auction_system}?sslmode=${DB_SSL_MODE:disable}}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    
  # JPA Configuration for PostgreSQL
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: Asia/Kolkata

# Server Configuration for Production
server:
  port: ${PORT:9090}
  servlet:
    session:
      timeout: 30m

auction:
  bid:
    minimum-increment: ${AUCTION_BID_MIN_INCREMENT:0.01}
    max-scale: 2
    rate-limit:
      per-second: ${AUCTION_BID_RATE_LIMIT_PER_SECOND:40}

infra:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic:
      bid-events: ${KAFKA_BID_TOPIC:auction-bid-events}
  redis:
    enabled: ${REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout-ms: ${REDIS_TIMEOUT_MS:2000}

stress:
  max-total-requests: ${STRESS_MAX_TOTAL_REQUESTS:20000}
  max-concurrency: ${STRESS_MAX_CONCURRENCY:256}
  job-timeout-seconds: ${STRESS_JOB_TIMEOUT_SECONDS:900}

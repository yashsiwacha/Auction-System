# See http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
spring:
  thymeleaf.cache: false
  main.banner-mode: off
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/Auction_System?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password: Yash2755@
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

# Server Configuration  
server:
  port: 9090
  servlet:
    session:
      timeout: 30m

auction:
  bid:
    minimum-increment: 0.01
    max-scale: 2
    rate-limit:
      per-second: 20

infra:
  kafka:
    enabled: false
    bootstrap-servers: localhost:9092
    topic:
      bid-events: auction-bid-events
  redis:
    enabled: false
    host: localhost
    port: 6379
    password: ""
    timeout-ms: 2000

stress:
  max-total-requests: 20000
  max-concurrency: 256
  job-timeout-seconds: 900